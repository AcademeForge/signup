<!doctype html><html lang="en" data-theme="light"><head><script>(()=>{var t="1"===localStorage.getItem("af_dark_mode")?"dark":"light";document.documentElement.setAttribute("data-theme",t)})()</script><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#ffe6e1"><title>Create your AcademeForge Account</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"><link rel="stylesheet" href="style.min.css?v=4.0"></head><body><div class="page-bg"></div><button class="dark-toggle" id="dmToggle" aria-label="Toggle dark mode" onclick="toggleDark()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg></button><div class="split-modal"><a href="https://academeforge.in/" class="close-btn" aria-label="Close"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></a><div class="split-left"><img src="/IMG/signup_hero.jpg" alt="AcademeForge Signup Illustration" class="hero-image"><div class="brand-overlay"><img src="/IMG/logo.png" alt="Logo" class="logo-sm" onerror='this.style.display="none"'> <span>AcademeForge.</span></div></div><div class="split-right"><div id="boxCreate" class="form-container"><h1 class="form-title">Sign Up</h1><div class="field-row"><div class="field-group"><label class="field-label" for="createName">Full Name</label><div class="input-wrapper"><span class="input-icon">👤</span> <input id="createName" class="field-input" type="text" placeholder="Your full name" autocomplete="name"></div></div><div class="field-group"><label class="field-label" for="createPhone">Phone</label><div class="input-wrapper phone-wrapper"><span class="input-icon">📱</span> <input id="createPhone" class="field-input phone-input" type="tel" placeholder="Phone number" maxlength="10" autocomplete="tel-national" inputmode="numeric"></div></div></div><div class="field-group"><label class="field-label" for="createEmail">Email</label><div class="input-wrapper"><span class="input-icon">✉️</span> <input id="createEmail" class="field-input" type="email" placeholder="you@example.com" autocomplete="email"></div></div><div class="field-group"><label class="field-label" for="createPassword">Password</label><div class="input-wrapper pw-wrap"><span class="input-icon">🔒</span> <input id="createPassword" class="field-input" type="password" placeholder="Create a password" autocomplete="new-password"> <button class="pw-eye" type="button" onclick="togglePw()" id="pwEye" aria-label="Show password"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg></button></div></div><div class="consent-group"><label class="consent-item"><input type="checkbox" id="cbTerms" class="consent-cb"> <span class="consent-text">I agree to the <a href="https://academeforge.in/terms/index.html" target="_blank">Terms</a> & <a href="https://academeforge.in/privacy/index.html" target="_blank">Privacy Policy</a>.</span></label> <label class="consent-item"><input type="checkbox" id="cbAge" class="consent-cb"> <span class="consent-text">I confirm I am 13+ years old.</span></label></div><div id="authMsg" class="msg hidden"><span class="msg-txt" id="msgTxt"></span></div><button class="btn-primary" type="button" id="btnSendOtp" onclick="sendOtp()">Sign Up</button><div class="divider"><span>Already have an account?</span></div><div class="login-link"><a href="https://academeforge.in">GO BACK TO ECOSYSTEM</a></div></div><div id="boxOtp" class="form-container hidden"><h2 class="form-title">Verify Email</h2><p class="section-desc">Code sent to <strong id="lblOtpEmail"></strong>.</p><div class="field-group"><label class="field-label" for="inpOtp">Verification Code</label><div class="input-wrapper"><input id="inpOtp" class="field-input otp-input" type="text" placeholder="000000" maxlength="6" autocomplete="one-time-code" inputmode="numeric"></div></div><div id="otpMsg" class="msg hidden"><span class="msg-txt" id="otpMsgTxt"></span></div><button class="btn-primary" type="button" id="btnVerify" onclick="verifyOtp()">Verify & Create Account</button><div class="action-row" style="margin-top:1rem;display:flex;justify-content:space-between"><button class="link-secondary" type="button" id="btnResend" onclick="resendOtp()">Resend Code</button> <button type="button" class="link-secondary" onclick='document.getElementById("boxOtp").classList.add("hidden"),document.getElementById("boxCreate").classList.remove("hidden")'>Change email</button></div></div></div></div><script src="script.min.js?v=4.0" defer="defer"></script></body></html>
